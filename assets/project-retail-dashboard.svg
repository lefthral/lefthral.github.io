<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">Retail analytics dashboard preview</title>
  <desc id="desc">Tableau-style retail analytics dashboard with KPI cards, regional bars, and promotional lift trend.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#141514"/>
      <stop offset=".5" stop-color="#17385f"/>
      <stop offset="1" stop-color="#bb563b"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="16" stdDeviation="16" flood-color="#000000" flood-opacity=".27"/>
    </filter>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)"/>
  <g filter="url(#shadow)" font-family="Arial, sans-serif">
    <rect x="74" y="74" width="1052" height="526" rx="26" fill="#fffdfa"/>
    <text x="122" y="132" fill="#141514" font-size="32" font-weight="900">Omni-channel retail dashboard</text>
    <rect x="122" y="176" width="228" height="118" rx="18" fill="#17385f"/>
    <text x="152" y="228" fill="#fffdfa" font-size="24" font-weight="800">Avg revenue</text>
    <text x="152" y="268" fill="#d69a25" font-size="42" font-weight="900">$25.6k</text>
    <rect x="382" y="176" width="228" height="118" rx="18" fill="#0f6b57"/>
    <text x="412" y="228" fill="#fffdfa" font-size="24" font-weight="800">ROI top zone</text>
    <text x="412" y="268" fill="#fffdfa" font-size="42" font-weight="900">$8.68</text>
    <rect x="642" y="176" width="420" height="118" rx="18" fill="#f5f1e8" stroke="#d7cfc0"/>
    <text x="676" y="228" fill="#141514" font-size="24" font-weight="800">Holiday lift</text>
    <text x="676" y="268" fill="#bb563b" font-size="42" font-weight="900">$24.67k -> $28.39k</text>
    <rect x="122" y="354" width="444" height="188" rx="18" fill="#f5f1e8" stroke="#d7cfc0"/>
    <rect x="166" y="452" width="42" height="58" fill="#17385f"/>
    <rect x="242" y="416" width="42" height="94" fill="#0f6b57"/>
    <rect x="318" y="384" width="42" height="126" fill="#d69a25"/>
    <rect x="394" y="432" width="42" height="78" fill="#bb563b"/>
    <rect x="470" y="402" width="42" height="108" fill="#6b5bbf"/>
    <text x="162" y="396" fill="#5b625d" font-size="22" font-weight="800">Regional performance</text>
    <rect x="618" y="354" width="444" height="188" rx="18" fill="#141514"/>
    <path d="M666 486C722 438 764 472 812 428c52-48 100 14 168-58" fill="none" stroke="#d69a25" stroke-width="10" stroke-linecap="round"/>
    <path d="M666 510H1010M666 510V394" fill="none" stroke="#fffdfa" stroke-opacity=".45" stroke-width="4"/>
    <text x="670" y="398" fill="#fffdfa" font-size="22" font-weight="800">Promotional lift trend</text>
  </g>
</svg>
