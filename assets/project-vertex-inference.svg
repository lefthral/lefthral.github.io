<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">Vertex AI inference automation preview</title>
  <desc id="desc">Cloud inference runtime showing GCS artifacts, scaler parity, endpoint scoring, and validation accuracy.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#17385f"/>
      <stop offset=".55" stop-color="#6b5bbf"/>
      <stop offset="1" stop-color="#141514"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="16" stdDeviation="16" flood-color="#000000" flood-opacity=".28"/>
    </filter>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)"/>
  <path d="M0 118h1200M0 236h1200M0 354h1200M0 472h1200M0 590h1200" stroke="#fffdfa" stroke-opacity=".07" stroke-width="2"/>
  <g filter="url(#shadow)" font-family="Arial, sans-serif" font-weight="800">
    <rect x="86" y="100" width="252" height="156" rx="20" fill="#fffdfa"/>
    <text x="126" y="158" fill="#141514" font-size="29">GCS artifacts</text>
    <rect x="126" y="190" width="160" height="18" rx="9" fill="#17385f"/>
    <rect x="396" y="100" width="252" height="156" rx="20" fill="#fffdfa"/>
    <text x="436" y="158" fill="#141514" font-size="29">Scaler state</text>
    <rect x="436" y="190" width="132" height="18" rx="9" fill="#0f6b57"/>
    <rect x="706" y="100" width="252" height="156" rx="20" fill="#fffdfa"/>
    <text x="746" y="158" fill="#141514" font-size="29">KFP schema</text>
    <rect x="746" y="190" width="174" height="18" rx="9" fill="#bb563b"/>
  </g>
  <path d="M338 178H396M648 178H706M834 256v82" fill="none" stroke="#d69a25" stroke-width="8" stroke-linecap="round"/>
  <g filter="url(#shadow)" font-family="Arial, sans-serif">
    <rect x="180" y="338" width="840" height="224" rx="24" fill="#141514" stroke="#fffdfa" stroke-opacity=".24" stroke-width="2"/>
    <text x="236" y="404" fill="#fffdfa" font-size="32" font-weight="900">Cloud inference runtime</text>
    <rect x="238" y="446" width="230" height="58" rx="14" fill="#0f6b57"/>
    <text x="276" y="484" fill="#fffdfa" font-size="24" font-weight="900">/predict API</text>
    <rect x="514" y="446" width="230" height="58" rx="14" fill="#17385f"/>
    <text x="560" y="484" fill="#fffdfa" font-size="24" font-weight="900">no skew</text>
    <rect x="790" y="420" width="170" height="110" rx="16" fill="#d69a25"/>
    <text x="826" y="464" fill="#141514" font-size="45" font-weight="900">97.0%</text>
    <text x="832" y="498" fill="#141514" font-size="20" font-weight="800">accuracy</text>
  </g>
</svg>
