<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">Healthcare predictive pipeline preview</title>
  <desc id="desc">Clinical machine learning pipeline with preprocessing, Vertex AI training, and ROC curve output.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#6b5bbf"/>
      <stop offset=".56" stop-color="#17385f"/>
      <stop offset="1" stop-color="#0f6b57"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000000" flood-opacity=".25"/>
    </filter>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)"/>
  <circle cx="1040" cy="94" r="170" fill="#fffdfa" fill-opacity=".08"/>
  <circle cx="106" cy="590" r="210" fill="#d69a25" fill-opacity=".10"/>
  <g filter="url(#shadow)" font-family="Arial, sans-serif" font-weight="800">
    <rect x="74" y="120" width="216" height="126" rx="18" fill="#fffdfa"/>
    <text x="116" y="174" fill="#141514" font-size="28">Raw EHR</text>
    <text x="116" y="210" fill="#5b625d" font-size="20">30.9% missing</text>
    <rect x="354" y="120" width="216" height="126" rx="18" fill="#fffdfa"/>
    <text x="396" y="174" fill="#141514" font-size="28">Impute</text>
    <text x="396" y="210" fill="#5b625d" font-size="20">median + scale</text>
    <rect x="634" y="120" width="216" height="126" rx="18" fill="#fffdfa"/>
    <text x="676" y="174" fill="#141514" font-size="28">SMOTE</text>
    <text x="676" y="210" fill="#5b625d" font-size="20">class balance</text>
    <rect x="914" y="120" width="216" height="126" rx="18" fill="#fffdfa"/>
    <text x="956" y="174" fill="#141514" font-size="28">Vertex AI</text>
    <text x="956" y="210" fill="#5b625d" font-size="20">experiments</text>
  </g>
  <g fill="none" stroke="#fffdfa" stroke-width="6" stroke-linecap="round" stroke-opacity=".7">
    <path d="M290 183H354"/>
    <path d="M570 183H634"/>
    <path d="M850 183H914"/>
  </g>
  <g filter="url(#shadow)">
    <rect x="88" y="332" width="454" height="246" rx="22" fill="#141514" stroke="#fffdfa" stroke-opacity=".24" stroke-width="2"/>
    <path d="M144 518C218 504 238 442 292 424c76-26 118 46 196-52" fill="none" stroke="#d69a25" stroke-width="10" stroke-linecap="round"/>
    <path d="M144 526H494M144 526V376" fill="none" stroke="#fffdfa" stroke-opacity=".45" stroke-width="4"/>
    <text x="156" y="390" fill="#fffdfa" font-family="Arial, sans-serif" font-size="27" font-weight="800">ROC curve</text>
    <text x="156" y="462" fill="#d69a25" font-family="Arial, sans-serif" font-size="54" font-weight="900">0.9795</text>
  </g>
  <g filter="url(#shadow)" font-family="Arial, sans-serif">
    <rect x="630" y="338" width="476" height="236" rx="22" fill="#fffdfa"/>
    <text x="670" y="398" fill="#141514" font-size="30" font-weight="900">Clinical threshold tuning</text>
    <rect x="674" y="440" width="348" height="22" rx="11" fill="#d7cfc0"/>
    <rect x="674" y="440" width="196" height="22" rx="11" fill="#0f6b57"/>
    <text x="674" y="504" fill="#bb563b" font-size="48" font-weight="900">0.50 -> 0.44</text>
    <text x="674" y="544" fill="#5b625d" font-size="22" font-weight="700">reduced false negatives</text>
  </g>
</svg>
